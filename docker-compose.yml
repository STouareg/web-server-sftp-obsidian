services:
  web-sftp-obsidian:
    build:
      context: .
      dockerfile: Dockerfile

    image: web-sftp-obsidian:local
    pull_policy: build
    container_name: web-sftp-obsidian
    restart: unless-stopped

    ports:
      - "8088:8080"

    environment:
      TZ: ${TZ:-Europe/Kyiv}
      SFTP_HOST: ${SFTP_HOST}
      SFTP_PORT: ${SFTP_PORT:-22}
      SFTP_USER: ${SFTP_USER}
      SFTP_PASSWORD: ${SFTP_PASSWORD}
      SFTP_REMOTE_FILE: ${SFTP_REMOTE_FILE}
      LOCAL_FILE: ${LOCAL_FILE:-/data/note.md}
      PAGE_TITLE: ${PAGE_TITLE:-}
      CHECK_INTERVAL_SECONDS: ${CHECK_INTERVAL_SECONDS:-300}

    volumes:
      - /opt/ks-web/data:/data

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)",
        ]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
